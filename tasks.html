
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; }
        .subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; }
        button.add-btn { padding: 10px 20px; background: #0070f3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #ddd; margin-bottom: 8px; border-radius: 4px; background: white; }
        .task-item.done { background: #f0fff0; }
        .task-title { cursor: pointer; flex: 1; font-size: 15px; }
        .task-title.done { text-decoration: line-through; color: #999; }
        button.delete-btn { background: red; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #0070f3; text-decoration: none; }
        .empty { color: #999; }
        .status { padding: 8px; border-radius: 4px; margin-bottom: 10px; display: none; }
        .status.error { background: #ffe0e0; color: red; display: block; }
        .status.success { background: #e0ffe0; color: green; display: block; }
        .footer { margin-top: 30px; font-size: 11px; color: #bbb; }
    </style>
</head>
<body>
    <a class="back-btn" href="index.html">← Back to Home</a>
    <h1>📝 Tasks App</h1>
    <p class="subtitle">Frontend: Vercel | Backend: Flask on EC2 | DB: MySQL RDS</p>
    <div id="status" class="status"></div>
    <div class="input-row">
        <input type="text" id="taskInput" placeholder="Enter task title..." onkeypress="if(event.key==='Enter') addTask()" />
        <button class="add-btn" onclick="addTask()">Add</button>
    </div>
    <div id="taskList"><p class="empty">Loading tasks...</p></div>
    <div class="footer">API: http://54.161.234.37/api/tasks</div>

<script>
    const API = "http://54.161.234.37/api/tasks";

    function showStatus(msg, type) {
        const el = document.getElementById("status");
        el.textContent = msg;
        el.className = "status " + type;
        setTimeout(() => el.className = "status", 3000);
    }

    async function fetchTasks() {
        try {
            const res = await fetch(API);
            const tasks = await res.json();
            renderTasks(tasks);
        } catch (err) {
            showStatus("Cannot connect to backend. Check EC2 is running.", "error");
            document.getElementById("taskList").innerHTML = "<p class='empty'>Failed to load tasks.</p>";
        }
    }

    function renderTasks(tasks) {
        const list = document.getElementById("taskList");
        if (tasks.length === 0) {
            list.innerHTML = "<p class='empty'>No tasks yet. Add one above!</p>";
            return;
        }
        list.innerHTML = tasks.map(task => `
            <div class="task-item ${task.done ? 'done' : ''}">
                <span class="task-title ${task.done ? 'done' : ''}" onclick="toggleTask(${task.id}, ${task.done})">
                    ${task.done ? '✅' : '⬜'} ${task.title}
                </span>
                <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
            </div>
        `).join("");
    }

    async function addTask() {
        const input = document.getElementById("taskInput");
        const title = input.value.trim();
        if (!title) return;
        try {
            await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title })
            });
            showStatus("Task added!", "success");
            input.value = "";
            fetchTasks();
        } catch (err) {
            showStatus("Failed to add task.", "error");
        }
    }

    async function toggleTask(id, currentDone) {
        try {
            await fetch(`${API}/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ done: !currentDone })
            });
            fetchTasks();
        } catch (err) {
            showStatus("Failed to update task.", "error");
        }
    }

    async function deleteTask(id) {
        try {
            await fetch(`${API}/${id}`, { method: "DELETE" });
            showStatus("Task deleted!", "success");
            fetchTasks();
        } catch (err) {
            showStatus("Failed to delete task.", "error");
        }
    }

    fetchTasks();
</script>
</body>
</html>
